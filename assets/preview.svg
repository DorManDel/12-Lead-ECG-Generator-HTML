      <stop offset="0" stop-color="#101827"/>
      <stop offset="1" stop-color="#122f38"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ffb3b3" stroke-opacity="0.12"/>
